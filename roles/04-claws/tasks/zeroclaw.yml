---
- name: Install ZeroClaw via cargo
  ansible.builtin.shell: |
    eval "$(mise activate bash)"
    cargo install zeroclaw@0.1.7 --locked
  args:
    executable: /bin/bash
  register: zeroclaw_install
  changed_when: "'Installed' in zeroclaw_install.stderr or 'Compiling' in zeroclaw_install.stderr"
