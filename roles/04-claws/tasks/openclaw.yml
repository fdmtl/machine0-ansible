---
- name: Install OpenClaw globally via npm
  ansible.builtin.shell: |
    eval "$(mise activate bash)"
    npm install -g openclaw@2026.3.22
  args:
    executable: /bin/bash
  register: openclaw_install
  changed_when: "'added' in openclaw_install.stdout or 'up to date' not in openclaw_install.stderr"
