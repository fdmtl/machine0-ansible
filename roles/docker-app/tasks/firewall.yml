---
- name: Install UFW
  become: true
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow SSH (port 22) before any deny rules
  become: true
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow application ports
  become: true
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ docker_app_firewall_ports }}"

- name: Set default deny incoming
  become: true
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set default allow outgoing
  become: true
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Enable UFW
  become: true
  community.general.ufw:
    state: enabled
