---
- name: Ensure apt keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Check if mise GPG key exists
  ansible.builtin.stat:
    path: /etc/apt/keyrings/mise-archive-keyring.gpg
  register: mise_gpg_key

- name: Download and install mise GPG key
  when: not mise_gpg_key.stat.exists
  block:
    - name: Download mise GPG key
      become: true
      ansible.builtin.get_url:
        url: https://mise.jdx.dev/gpg-key.pub
        dest: /tmp/mise-key.pub
        mode: "0644"

    - name: Verify mise GPG key fingerprint
      ansible.builtin.shell: |
        gpg --dry-run --import --import-options import-show /tmp/mise-key.pub 2>&1 | grep -q "24853EC9F655CE80B48E6C3A8B81C9D17413A06D"
      register: gpg_check
      failed_when: gpg_check.rc != 0
      changed_when: false

    - name: Install mise GPG key
      become: true
      ansible.builtin.shell: |
        gpg --dearmor -o /etc/apt/keyrings/mise-archive-keyring.gpg < /tmp/mise-key.pub

    - name: Set mise GPG key permissions
      become: true
      ansible.builtin.file:
        path: /etc/apt/keyrings/mise-archive-keyring.gpg
        mode: "0644"
  always:
    - name: Clean up temporary mise GPG key
      become: true
      ansible.builtin.file:
        path: /tmp/mise-key.pub
        state: absent

- name: Add mise apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.gpg arch={{ ansible_facts['architecture'] | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }}] https://mise.jdx.dev/deb stable main"
    filename: mise
    state: present

- name: Install mise
  become: true
  ansible.builtin.apt:
    name: mise
    state: present
    update_cache: true

- name: Activate mise in .zshrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    line: 'eval "$(mise activate zsh)"'
    create: true
    mode: "0644"

- name: Install runtime tools via mise
  ansible.builtin.command:
    cmd: "mise use --global {{ item }}"
  environment:
    MISE_PYTHON_PRECOMPILED_FLAVOR: "install_only_stripped"
  loop:
    - node@22.16.0
    - bun@1.1.42
    - python@3.13.1
    - uv@0.5.11
    - pipx@1.7.1
    - rust@1.94.0
    - go@1.23.4
  register: mise_install
  changed_when: "'installed' in mise_install.stderr or 'installed' in mise_install.stdout"
