---
- name: Check if Claude Code is already installed at correct version
  ansible.builtin.shell: |
    eval "$(mise activate bash)"
    npm list -g @anthropic-ai/claude-code --depth=0 2>/dev/null | grep -q '@anthropic-ai/claude-code@2.1.87'
  args:
    executable: /bin/bash
  register: claude_check
  changed_when: false
  failed_when: false

- name: Install Claude Code globally via npm
  ansible.builtin.shell: |
    eval "$(mise activate bash)"
    npm install -g @anthropic-ai/claude-code@2.1.87
  args:
    executable: /bin/bash
  register: claude_install
  changed_when: "'added' in claude_install.stdout"
  when: claude_check.rc != 0

- name: Verify Claude Code installed version
  ansible.builtin.shell: |
    eval "$(mise activate bash)"
    npm list -g @anthropic-ai/claude-code --depth=0 2>/dev/null | grep -q '@anthropic-ai/claude-code@2.1.87'
  args:
    executable: /bin/bash
  changed_when: false
