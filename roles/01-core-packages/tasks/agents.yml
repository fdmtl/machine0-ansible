---
- name: Install Claude Code globally via npm
  ansible.builtin.shell: |
    eval "$(mise activate bash)"
    npm install -g @anthropic-ai/claude-code@2.1.87
  args:
    executable: /bin/bash
  register: claude_install
  changed_when: "'added' in claude_install.stdout or 'up to date' not in claude_install.stderr"
