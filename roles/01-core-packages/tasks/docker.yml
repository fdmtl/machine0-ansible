---
- name: Install Docker prerequisites
  become: true
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present

- name: Ensure apt keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Check if Docker GPG key exists
  ansible.builtin.stat:
    path: /etc/apt/keyrings/docker.asc
  register: docker_gpg_key

- name: Download Docker GPG key
  become: true
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    checksum: "sha256:1500c1f56fa9e26b9b8f42452a553675796ade0807cdce11975eb98170b3a570"
    mode: "0644"
  when: not docker_gpg_key.stat.exists

- name: Get Ubuntu version codename
  ansible.builtin.shell:
    cmd: . /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
  register: ubuntu_codename
  changed_when: false

- name: Add Docker apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_facts['architecture'] | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ubuntu_codename.stdout }} stable"
    filename: docker
    state: present

- name: Assert Ubuntu version is 24.04 (Docker version pins are release-specific)
  ansible.builtin.assert:
    that: ansible_distribution_version == "24.04"
    msg: >-
      Docker version pins are Ubuntu 24.04-specific.
      Update version strings in docker.yml for {{ ansible_distribution_version }}.

- name: Install Docker packages
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce=5:29.3.1-1~ubuntu.24.04~noble
      - docker-ce-cli=5:29.3.1-1~ubuntu.24.04~noble
      - containerd.io=2.2.2-1~ubuntu.24.04~noble
      - docker-buildx-plugin=0.33.0-1~ubuntu.24.04~noble
      - docker-compose-plugin=5.1.1-1~ubuntu.24.04~noble
    state: present
    update_cache: true

# NOTE: Docker group membership grants effective root access via container escape.
# This is an accepted trade-off for developer VMs. For production workloads,
# consider Docker rootless mode.
- name: Add user to docker group
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
