---
- name: Ensure sshd privsep directory exists
  become: true
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    mode: "0755"
  listen: Restart sshd

- name: Validate sshd config
  become: true
  ansible.builtin.command: sshd -t
  changed_when: false
  listen: Restart sshd

- name: Restart sshd
  become: true
  ansible.builtin.service:
    name: ssh
    state: restarted

- name: Restart fail2ban
  become: true
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: Restart nix-daemon
  become: true
  ansible.builtin.service:
    name: nix-daemon
    state: restarted
