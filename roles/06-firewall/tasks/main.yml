---
- name: Install UFW
  become: true
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Reset UFW to clean state
  become: true
  community.general.ufw:
    state: reset

- name: Allow configured TCP ports
  become: true
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Set default deny incoming
  become: true
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set default allow outgoing
  become: true
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Enable UFW
  become: true
  community.general.ufw:
    state: enabled
