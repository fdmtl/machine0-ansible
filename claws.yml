---
# =============================================================================
# Claws Playbook
# Installs all major AI agent claw frameworks
# Usage: ansible-playbook -i "IP," -u barnaby claws.yml
# Requires xl (8GB) VM or larger — NemoClaw's dependency tree needs the RAM
# =============================================================================

- hosts: all
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  roles:
    - role: 01-core-packages
    - role: 02-shell
    - role: 04-claws
      vars:
        open_claw: true
        nemo_claw: true
        nano_claw: true
        meta_claw: true
        zero_claw: true
    - role: 03-motd
      vars:
        motd_type: message
        motd_message_body: |
          Welcome to your Claws VM! The following AI agent frameworks are installed.
          Run the onboarding command for each to get started:

          $ openclaw onboard --install-daemon
          $ nemoclaw onboard
          $ cd ~/nanoclaw && claude    (then run /setup)
          $ metaclaw setup
          $ zeroclaw onboard

          Note: first-time startup may take 30-60s for each agent.
    - role: 06-firewall
      vars:
        firewall_allowed_tcp_ports:
          - "22"

  post_tasks:
    - name: Reboot the machine
      become: true
      ansible.builtin.reboot:
        reboot_timeout: 300
