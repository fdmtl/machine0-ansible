---
# =============================================================================
# Nix Provisioning Playbook
# Single-command provisioning: installs nix, copies the flake, sets up system
# services (Docker, SSH, MOTD, Webserver), builds with home-manager, and
# installs Claude Code. System hardening completes before the potentially-long
# nix build.
#
# Usage: machine0 provision <vm> nix.yml
# =============================================================================

- hosts: all
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    claude_code_version: "2.1.87"

  pre_tasks:
    # Webserver setup: create public directory, test file, nginx config
    - name: Create public directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/public"
        state: directory
        mode: "0755"

    - name: Create example.txt
      ansible.builtin.copy:
        dest: "{{ ansible_env.HOME }}/public/example.txt"
        content: "This is an example file served by the fileserver.\n"
        mode: "0644"

    - name: Create nginx autoindex config
      ansible.builtin.copy:
        dest: "{{ ansible_env.HOME }}/nginx-fileserver.conf"
        content: |
          server {
              listen 80;
              listen [::]:80;
              server_name _;
              location / {
                  root /usr/share/nginx/html;
                  autoindex on;
              }
          }
        mode: "0644"

  tasks:
    # 1. Install zsh + git (git needed for nix flake fetches / make.sh builds)
    - name: Ensure zsh and git are installed
      become: true
      ansible.builtin.apt:
        name:
          - zsh
          - git
        state: present
        update_cache: true

    # 2. Set zsh as login shell (needs root; home-manager can't do this)
    - name: Set zsh as default shell
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /usr/bin/zsh

    # 3. Install nix daemon + enable flakes + copy flake to remote
    - name: Install nix and copy flake
      import_role:
        name: 05-nix

    # 4. Docker (reuse existing, needs root/systemd)
    - name: Install Docker
      import_role:
        name: 01-core-packages
        tasks_from: docker.yml

    # Pick up docker group membership before running docker commands
    - name: Reset SSH connection for docker group
      ansible.builtin.meta: reset_connection

    # 5. SSH hardening (reuse existing, needs root)
    - name: Harden SSH
      import_role:
        name: 01-core-packages
        tasks_from: ssh-hardening.yml

    # 6. MOTD (reuse existing, needs root for /etc/update-motd.d/)
    - name: Configure MOTD
      import_role:
        name: 03-motd

    # Flush handlers (Restart sshd, etc.) so hardening is live before long builds
    - name: Flush handlers before long builds
      ansible.builtin.meta: flush_handlers

    # 7. Deploy webserver (nginx in Docker, serves ~/public on port 80)
    - name: Deploy webserver
      import_role:
        name: docker-app
      vars:
        docker_app_name: fileserver
        docker_app_image: nginx:alpine
        docker_app_ports:
          - "80:80"
        docker_app_volumes:
          - "{{ ansible_env.HOME }}/public:/usr/share/nginx/html:ro"
          - "{{ ansible_env.HOME }}/nginx-fileserver.conf:/etc/nginx/conf.d/default.conf:ro"

    # 8. Configure firewall (declarative: reset + rebuild)
    - name: Configure firewall
      import_role:
        name: 06-firewall
      vars:
        firewall_allowed_tcp_ports:
          - "22"
          - "80"

    # 9. Activate home-manager (after system services, long nix build)
    - name: Run home-manager switch
      ansible.builtin.shell:
        cmd: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          cd ~/.machine0-nix
          nix run home-manager/release-24.11 -- switch --flake .#ubuntu -b backup
        executable: /bin/bash
      register: hm_switch
      changed_when: true

    # 10. Claude Code (npm global, outside nix)
    - name: Install Claude Code
      ansible.builtin.shell:
        cmd: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          export PATH="$HOME/.nix-profile/bin:$HOME/.npm-global/bin:$PATH"
          WANT="{{ claude_code_version }}"
          GOT="$(claude --version 2>/dev/null || echo none)"
          if ! echo "$GOT" | grep -qF "$WANT"; then
            mkdir -p ~/.npm-global
            npm install -g --prefix ~/.npm-global "@anthropic-ai/claude-code@$WANT"
          fi
        executable: /bin/bash
      register: claude_install
      changed_when: "'added' in claude_install.stdout or 'changed' in claude_install.stdout"

  post_tasks:
    - name: Verify provisioning
      ansible.builtin.shell:
        cmd: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          export PATH="$HOME/.nix-profile/bin:$HOME/.npm-global/bin:$PATH"
          FAIL=0
          for cmd in nix gcc cmake git node bun python3 uv pipx rustc cargo go starship eza claude docker; do
            command -v $cmd >/dev/null 2>&1 || { echo "MISSING: $cmd"; FAIL=1; }
          done
          [ "$(getent passwd $(whoami) | cut -d: -f7)" = "/usr/bin/zsh" ] || { echo "FAIL: login shell not zsh"; FAIL=1; }
          sudo sshd -T 2>/dev/null | grep -qi "passwordauthentication no" || { echo "FAIL: SSH not hardened"; FAIL=1; }
          [ -f /etc/update-motd.d/00-machine0-header ] || { echo "FAIL: MOTD missing"; FAIL=1; }
          docker ps --filter name=fileserver --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q "Up" || { echo "FAIL: fileserver container not running"; FAIL=1; }
          curl -sf http://localhost/example.txt >/dev/null || { echo "FAIL: webserver not serving files"; FAIL=1; }
          exit $FAIL
        executable: /bin/bash
      changed_when: false
